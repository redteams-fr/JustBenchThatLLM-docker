{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justbenchthatllm.fullname" . }}-worker
  labels:
    {{- include "justbenchthatllm.worker.labels" . | nindent 4 }}
  {{- if or .Values.global.annotations .Values.worker.podAnnotations }}
  annotations:
    {{- include "justbenchthatllm.worker.annotations" . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "justbenchthatllm.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "justbenchthatllm.worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.worker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.global.annotations .Values.worker.podAnnotations }}
      annotations:
        {{- include "justbenchthatllm.worker.annotations" . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.worker.pullSecret }}
      imagePullSecrets:
      - name: {{ .Values.worker.pullSecret }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: worker
        image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
        imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
        env:
        - name: REDIS_URL
          value: {{ include "justbenchthatllm.redis.url" . }}
        - name: MONGODB_URL
          value: {{ include "justbenchthatllm.mongo.url" . }}
        {{- range $key, $value := .Values.worker.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.worker.caBundle.enabled }}
        volumeMounts:
        - name: ca-bundle
          mountPath: {{ .Values.worker.caBundle.mountPath }}
          subPath: {{ .Values.worker.caBundle.subPath }}
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.worker.livenessProbe.httpGet.path }}
            port: {{ .Values.worker.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.worker.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.worker.readinessProbe.httpGet.path }}
            port: {{ .Values.worker.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.worker.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.worker.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.worker.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.worker.readinessProbe.failureThreshold }}
        resources:
          {{- toYaml .Values.worker.resources | nindent 10 }}
      {{- if .Values.worker.caBundle.enabled }}
      volumes:
      - name: ca-bundle
        configMap:
          name: {{ .Values.worker.caBundle.existingConfigMap | default (printf "%s-worker-ca" (include "justbenchthatllm.fullname" .)) }}
      {{- end }}
{{- end }}

